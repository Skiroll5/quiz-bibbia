<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        body {
            font-family: 'Nunito', 'Comic Sans MS', sans-serif;
            background-color: #87CEEB; /* Azzurro cielo */
            background-image: radial-gradient(#ffffff 15%, transparent 16%), radial-gradient(#ffffff 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-container {
            background-color: #FFF9E6; /* Giallo sabbia chiaro */
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            max-width: 650px;
            width: 100%;
            text-align: center;
            border: 8px solid #FFD700; /* Oro */
            position: relative;
        }

        h1 {
            color: #FF8C00; /* Arancione vivace */
            font-size: 2.5em;
            margin-top: 0;
            text-shadow: 2px 2px 0px #FFF, 4px 4px 0px rgba(0,0,0,0.1);
        }

        .question-box {
            background: #FFFFFF;
            border: 4px dashed #87CEEB;
            border-radius: 15px;
            padding: 30px 20px;
            margin: 20px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .question {
            font-size: 1.6em;
            color: #333;
            font-weight: 800;
            margin: 0;
        }

        .answer {
            font-size: 1.5em;
            color: #228B22; /* Verde foresta */
            font-weight: 700;
            background: #E0FFEA;
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #32CD32;
            margin: 20px 0;
            display: none; /* Nascosta di default */
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        @media (min-width: 500px) {
            .controls {
                flex-direction: row;
                justify-content: center;
            }
        }

        button {
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: 800;
            font-family: inherit;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.1s;
            color: white;
            text-transform: uppercase;
        }

        .btn-toggle {
            background-color: #FF6347; /* Tomato */
            box-shadow: 0 6px 0 #CD5C5C;
        }

        .btn-toggle:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        .btn-next {
            background-color: #32CD32; /* Lime Green */
            box-shadow: 0 6px 0 #228B22;
        }

        .btn-next:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        .btn-next:disabled {
            background-color: #A9A9A9;
            box-shadow: 0 6px 0 #808080;
            cursor: not-allowed;
        }

        .progress {
            margin-top: 25px;
            font-size: 1.1em;
            color: #888;
            font-weight: bold;
        }

        .end-message {
            display: none;
            color: #FF4500;
            font-size: 2em;
            font-weight: 900;
            margin-top: 20px;
        }
    </style>
</head>
